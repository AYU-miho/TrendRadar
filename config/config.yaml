# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件【一次性烂梗溯源专用】
#                      Version: 2.4.0
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: false


# ===============================================================
# 1.5 调度系统 —— 一次性抓取，关闭自动定时
# ===============================================================
schedule:
  enabled: false
  preset: "morning_evening"


# ===============================================================
# 2. 数据源 - 热榜平台（全开，覆盖全部烂梗渠道）
# ===============================================================
platforms:
  enabled: true
  api_url: ""
  sources:
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
      expected_domain: "bilibili.com"
    - id: "cls-hot"
      name: "财联社热门"
      expected_domain: "cls.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"
    - id: "tieba"
      name: "贴吧"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "douyin"
      name: "抖音"
      expected_domain: "douyin.com"
    - id: "zhihu"
      name: "知乎"
      expected_domain: "zhihu.com"



# ===============================================================
# 3. 数据源 - RSS 订阅（保留默认，不影响烂梗抓取）
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"

    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      enabled: false
     
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"


# ===============================================================
# 4. 报告模式：增量时序，完整记录梗起源/扩散/衰退全节点
# ===============================================================
report:
  mode: "incremental"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 0


# ===============================================================
# 4.5 筛选策略：纯关键词匹配，不调用AI，零token消耗
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: true


# ===============================================================
# 4.6 AI 智能筛选配置【完全关闭，无需填写API密钥】
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: false
  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知【全关闭，无需任何机器人webhook】
# ===============================================================
notification:
  enabled: false
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置【核心：强制本地存储，彻底禁用R2/远程S3云存储，无需绑卡付费】
# ===============================================================
storage:
  backend: "local"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置【全部停用，留空无需密钥】
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能【关闭，不消耗API】
# ===============================================================
ai_analysis:
  enabled: false
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true


# ===============================================================
# 10. AI 翻译功能【关闭，减少运行耗时】
# ===============================================================
ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true


# ===============================================================
# 11. 高级设置（爬虫限流优化，防止抓取老帖被平台封禁）
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_interval: 3000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"

  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""

  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1

  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
